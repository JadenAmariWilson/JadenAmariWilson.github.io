<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>we forgor - NewGame</title>
    <style>
        #startButton {
            position: absolute;
            top: 100px;
            left: 100px;
        }
    </style>
</head>
<body>
    <button id="startButton" onmouseover="moveButton()">click me to begin,,</button> 
</body>
<SCRIPT>
function moveButton() {
    var button=document.getElementById("startButton")
    var height = window.innerHeight
    var width = window.innerWidth

    //rand pos
    width = Math.random() * width
    height = Math.random() * height

    button.style.left=width+"px"
    button.style.top=height+"px"
}
</SCRIPT>
</html>
